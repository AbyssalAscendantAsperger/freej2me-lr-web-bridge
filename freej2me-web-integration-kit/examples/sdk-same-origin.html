<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FreeJ2ME SDK same-origin example</title>
<style>
body{background:#111;color:#eee;font-family:sans-serif} canvas{image-rendering:pixelated;border:2px solid #555;background:#000} input,button{padding:8px;margin:3px}
</style>
</head>
<body>
<h2>FreeJ2ME SDK same-origin example</h2>
<div id="status">idle</div>
<div>
  <input id="u" placeholder="username"><input id="p" type="password" placeholder="password">
  <button id="reg">register</button><button id="login">login</button><button id="audio">unlock audio</button>
</div>
<div><input id="jar" type="file" accept=".jar,.jad"></div>
<canvas id="screen" width="320" height="240"></canvas>
<script src="../client/freej2me-embed-client.js"></script>
<script>
const client = new FreeJ2MEEmbedClient({ baseUrl: '', canvas: '#screen', statusEl: '#status' });
reg.onclick = async()=>{ await client.register(u.value,p.value); await client.login(u.value,p.value); client.connect(); };
login.onclick = async()=>{ await client.login(u.value,p.value); client.connect(); };
audio.onclick = ()=>client.unlockAudio();
jar.onchange = async()=>{ if(jar.files[0]) await client.uploadJar(jar.files[0]); };
const keyMap = { ArrowUp:0, ArrowDown:1, ArrowLeft:2, ArrowRight:3, Enter:7, q:9, e:8, z:12, c:13,
  '0':6,'1':10,'2':14,'3':11,'4':15,'5':18,'6':16,'7':5,'8':17,'9':4 };
window.addEventListener('keydown', e=>{ if(e.target.tagName==='INPUT') return; const k=keyMap[e.key]; if(k!==undefined){e.preventDefault(); client.keyDown(k);} });
window.addEventListener('keyup', e=>{ if(e.target.tagName==='INPUT') return; const k=keyMap[e.key]; if(k!==undefined){e.preventDefault(); client.keyUp(k);} });
</script>
</body>
</html>
