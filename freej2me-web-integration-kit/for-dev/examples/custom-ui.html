<!doctype html><html><head><meta charset="utf-8"><title>Custom UI Headless Core</title><style>body{background:#111;color:white;font-family:sans-serif}canvas{background:#000;image-rendering:pixelated;width:640px;height:480px}</style></head><body>
<h2>Custom UI - Dev controls everything</h2>
<div><input id="uid" value="dev-user-1"> <input id="jar" type="file" accept=".jar,.jad"> <button id="audio">audio</button></div>
<canvas id="screen" width="320" height="240"></canvas><pre id="log"></pre>
<script src="../client/headless-client.js"></script><script>
const c=new FreeJ2MEHeadlessClient({baseUrl:'http://localhost:3100',token:'dev-secret',canvas:'#screen',onStatus:s=>log.textContent=s});
audio.onclick=()=>c.unlockAudio();
jar.onchange=async()=>{const r=await c.createInstance({file:jar.files[0],externalUserId:uid.value,width:320,height:240,options:{videoCodec:'rgb565',maxFps:30}}); c.connect(r.instanceId);};
const map={w:0,s:1,a:2,d:3,Enter:7,q:9,e:8,z:12,c:13,'0':6,'1':10,'2':14,'3':11,'4':15,'5':18,'6':16,'7':5,'8':17,'9':4};
addEventListener('keydown',e=>{if(map[e.key]!==undefined){e.preventDefault();c.key(map[e.key],'D')}}); addEventListener('keyup',e=>{if(map[e.key]!==undefined){e.preventDefault();c.key(map[e.key],'U')}});
</script></body></html>
